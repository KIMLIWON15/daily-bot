name: Stock Tracker Bot

on:
  schedule:
    # ⏱️ 월요일부터 금요일까지(1-5) 지정된 분/시간에 칼같이 작동합니다.
    # 깃허브 서버는 세계표준시(UTC) 기준이므로 한국 시간(KST)에서 9시간을 빼서 계산했습니다.
    #
    # 1) [01분 패치] 한국 시간 08:01, 20:01 실행
    #    - UTC 기준: 전날 23:01 (08시), 당일 11:01 (20시)
    # 2) [10분 패치] 한국 시간 09:10 ~ 19:10까지 매시간 10분 실행
    #    - UTC 기준: 당일 00:10 ~ 10:10
    - cron: '1 23,11 * * 1-5'
    - cron: '10 0-10 * * 1-5'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests
          
      - name: Run stock bot
        env:
          STOCK_TOKEN: ${{ secrets.STOCK_TOKEN }}
          STOCK_CHAT_ID: ${{ secrets.STOCK_CHAT_ID }}
        run: python stock_bot.py
