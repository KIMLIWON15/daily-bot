name: Stock Tracker Bot

on:
  schedule:
    # 한국 시간 08:10 ~ 20:10 (평일 월~금만 작동)
    # UTC 기준으로는 전날 23:10, 그리고 당일 00:10 ~ 11:10에 해당합니다.
    - cron: '10 23,0-11 * * 1-5'
    - cron: '10 0-10 * * 1-5'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests
          
      - name: Run stock bot
        env:
          STOCK_TOKEN: ${{ secrets.STOCK_TOKEN }}
          STOCK_CHAT_ID: ${{ secrets.STOCK_CHAT_ID }}
        run: python stock_bot.py
