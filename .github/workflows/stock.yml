name: Stock Tracker Bot

on:
  schedule:
    # 1. 아침 시세: 한국시간 월~금 08:01 (UTC 기준: 일~목 23:01)
    - cron: '1 23 * * 0-4'
    
    # 2. 장중 시세: 한국시간 월~금 09:10 ~ 19:10 매시간 10분 (UTC 기준: 월~금 00:10 ~ 10:10)
    - cron: '10 0-10 * * 1-5'
    
    # 3. 마감 시세: 한국시간 월~금 20:01 (UTC 기준: 월~금 11:01)
    - cron: '1 11 * * 1-5'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests
          
      - name: Run stock bot
        env:
          STOCK_TOKEN: ${{ secrets.STOCK_TOKEN }}
          STOCK_CHAT_ID: ${{ secrets.STOCK_CHAT_ID }}
        run: python stock_bot.py
