name: Daily Automation Bot

# 언제 실행할지 정의합니다.
on:
  schedule:
    # ⚠️ UTC 표준시 기준입니다. (한국 시간 오전 7시는 UTC로 전날 오후 10시)
    - cron: '0 22 * * *'
  # 깃허브 웹사이트에서 수동으로도 실행해 볼 수 있게 버튼을 만듭니다.
  workflow_dispatch:

# 실행할 작업 내용을 정의합니다.
jobs:
  run-bot:
    runs-on: ubuntu-latest # 최신 리눅스 환경 컴퓨터를 하나 빌립니다.

    steps:
    - name: 1. 저장소의 코드 가져오기
      uses: actions/checkout@v4

    - name: 2. 파이썬 환경 설치하기
      uses: actions/setup-python@v5
      with:
        python-python-version: '3.10'

    - name: 3. 필요한 라이브러리 설치 (필요시)
      run: |
        pip install requests beautifulsoup4

    - name: 4. 파이썬 스크립트 실행하기
      run: python main.py
env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        # 💡 참고: 내 텔레그램 채팅방 ID도 금고에 넣었다면 아래처럼 추가 가능합니다.
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python main.py
