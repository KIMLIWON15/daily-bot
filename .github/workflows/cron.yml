name: Daily Automation Bot

on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
    - name: 1. 저장소의 코드 가져오기
      uses: actions/checkout@v4

    - name: 2. 파이썬 환경 설치하기
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 3. 필요한 라이브러리 설치
      run: |
        pip install requests beautifulsoup4

    - name: 4. 파이썬 스크립트 실행하기
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python main.py
